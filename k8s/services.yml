# =============================================================================
# HC Platform — Application Services (8 backend services)
# =============================================================================
# Each service consists of two Kubernetes resources, separated by ---:
#   1. Deployment  — manages pod lifecycle, image, env vars, probes
#   2. Service     — stable ClusterIP DNS name for internal communication
#
# Env var strategy per Deployment:
#   envFrom: configMapRef  → injects all ConfigMap keys as env vars in one shot
#   env: (individual)      → injects per-service secrets and the PORT override
#
# imagePullPolicy: IfNotPresent — uses locally built images (for minikube /
#   Docker Desktop). Change to Always when pushing to a container registry.
#
# Apply with:   kubectl apply -f k8s/services.yml
# =============================================================================


# =============================================================================
# 1. auth-service  (port 5007)
# Dependencies: mongo, patient-service, doctor-service
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: hc-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5007
          envFrom:
            - configMapRef:
                name: hc-config
          env:
            - name: PORT
              value: "5007"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: hc-secrets
                  key: AUTH_MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hc-secrets
                  key: JWT_SECRET
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: hc-secrets
                  key: INTERNAL_SECRET
            - name: ADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hc-secrets
                  key: ADMIN_DEFAULT_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 5007
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5007
            initialDelaySeconds: 30
            periodSeconds: 30

---

apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: healthcare
spec:
  selector:
    app: auth-service
  ports:
    - port: 5007
      targetPort: 5007


