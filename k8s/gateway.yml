# =============================================================================
# HC Platform — API Gateway (public entrypoint)
# =============================================================================
# The api-gateway is the ONLY service exposed outside the cluster.
# All other services are ClusterIP (internal only).
#
# Service type: NodePort — exposes port 5000 on the cluster node's IP.
#   - minikube:         access at $(minikube ip):30500
#   - Docker Desktop:   access at localhost:30500
#
# The api-gateway needs JWT_SECRET to validate tokens on incoming requests,
# and all downstream service URLs to proxy requests to the correct service.
#
# Apply with:   kubectl apply -f k8s/gateway.yml
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: hc-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: hc-config          # Injects all *_SERVICE_URL values
          env:
            - name: PORT
              value: "5000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hc-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30

---

# -----------------------------------------------------------------------------
# API Gateway NodePort Service
# NodePort 30500 is the stable external port to hit from your browser or
# Postman. It forwards to port 5000 inside the pod.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: healthcare
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 5000        # Cluster-internal port
      targetPort: 5000  # Container port
      nodePort: 30500   # External port (range 30000–32767)
