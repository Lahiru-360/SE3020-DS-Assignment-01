# ─────────────────────────────────────────────────────────────────
# HC Platform — Docker Compose
#
# Environment strategy:
#   Each service has its own .env file (gitignored) with ALL its
#   variables. Docker Compose loads them via env_file — no
#   environment: overrides. Copy .env.example → .env and fill in
#   real values before first run.
#
# Currently registered services:
#   api-gateway           → port 5000  (public entry point)
#   auth-service          → port 5007  (internal only)
#   patient-service       → port 5002  (internal only)
#   doctor-service        → port 5001  (internal only)
#   appointment-service   → port 5003  (internal only)
#   notification-service  → port 5004  (internal only)
#   telemedicine-service  → port 5005  (internal only)
#   payment-service       → port 5006  (internal only)
#   ai-service            → port 5008  (internal only)
#   rabbitmq              → port 5672  (AMQP) / 15672 (management UI)
#   mongo                 → port 27017 (internal only)
# ─────────────────────────────────────────────────────────────────

services:
  # ── RabbitMQ ───────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: hc-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # AMQP protocol (used by services)
      - "15672:15672" # Management UI — http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: hcadmin
      RABBITMQ_DEFAULT_PASS: hcpassword
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - hc-network

  # ── MongoDB ───────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: hc-mongo
    restart: unless-stopped
    ports:
      - "27017:27017" # expose for local tools (Compass, mongosh)
    volumes:
      - mongo_data:/data/db
    networks:
      - hc-network

  # ── Auth Service ──────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: hc-auth-service
    restart: unless-stopped
    env_file:
      - ./services/auth-service/.env
    depends_on:
      - mongo
      - patient-service
      - doctor-service
    volumes:
      - ./services/auth-service:/app
      - /app/node_modules
    networks:
      - hc-network

  # ── Patient Service ───────────────────────────────────────────
  patient-service:
    build:
      context: ./services/patient-service
      dockerfile: Dockerfile
    container_name: hc-patient-service
    restart: unless-stopped
    env_file:
      - ./services/patient-service/.env
    depends_on:
      - mongo
    volumes:
      - ./services/patient-service:/app
      - /app/node_modules
    networks:
      - hc-network

  # ── Doctor Service ────────────────────────────────────────────
  doctor-service:
    build:
      context: ./services/doctor-service
      dockerfile: Dockerfile
    container_name: hc-doctor-service
    restart: unless-stopped
    env_file:
      - ./services/doctor-service/.env
    depends_on:
      - mongo
    volumes:
      - ./services/doctor-service:/app
      - /app/node_modules
    networks:
      - hc-network

  # ── Appointment Service ───────────────────────────────────────
  appointment-service:
    build:
      context: ./services/appointment-service
      dockerfile: Dockerfile
    container_name: hc-appointment-service
    restart: unless-stopped
    env_file:
      - ./services/appointment-service/.env
    depends_on:
      - mongo
      - doctor-service
      - patient-service
      - notification-service
      - rabbitmq
    volumes:
      - ./services/appointment-service:/app
      - /app/node_modules
    networks:
      - hc-network

  # ── Notification Service ──────────────────────────────────────
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: hc-notification-service
    restart: unless-stopped
    env_file:
      - ./services/notification-service/.env
    depends_on:
      - mongo
      - rabbitmq
    volumes:
      - ./services/notification-service:/app
      - /app/node_modules
    networks:
      - hc-network

  # ── Telemedicine Service ──────────────────────────────────────
  telemedicine-service:
    build:
      context: ./services/telemedicine-service
      dockerfile: Dockerfile
    container_name: hc-telemedicine-service
    restart: unless-stopped
    env_file:
      - ./services/telemedicine-service/.env
    depends_on:
      - mongo
      - appointment-service
      - rabbitmq
    volumes:
      - ./services/telemedicine-service:/app
      - /app/node_modules
    networks:
      - hc-network

  # ── Payment Service ───────────────────────────────────────────────────────
  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: hc-payment-service
    restart: unless-stopped
    env_file:
      - ./services/payment-service/.env
    depends_on:
      - mongo
      - appointment-service
    volumes:
      - ./services/payment-service:/app
      - /app/node_modules
    networks:
      - hc-network
      
      
  # ── AI Suggestion Service ──────────────────────────────────────────────
  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: hc-ai-service
    restart: unless-stopped
    env_file:
      - ./services/ai-service/.env
    depends_on:
      - mongo
      - doctor-service
    volumes:
      - ./services/ai-service:/app
      - /app/node_modules
    networks:
      - hc-network
    # NOT exposed to the host — all traffic must go through the gateway

  # ── API Gateway ───────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: hc-api-gateway
    restart: unless-stopped
    ports:
      - "5000:5000" # single public-facing port
    env_file:
      - ./services/api-gateway/.env
    depends_on:
      - auth-service
      - patient-service
      - doctor-service
      - appointment-service
      - notification-service
      - telemedicine-service
      - payment-service
      - ai-service
    volumes:
      - ./services/api-gateway:/app
      - /app/node_modules
    networks:
      - hc-network


# ── Volumes ────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  rabbitmq_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────
networks:
  hc-network:
    driver: bridge
